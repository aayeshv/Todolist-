<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        body {
            background-color: white;
        }
        .task {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>My Todo List</h1>
    <div class="task">
        <span>Task 1</span>
        <button onclick="markAsDone(this)">Complete</button>
    </div>
    <div class="task">
        <span>Task 2</span>
        <button onclick="markAsDone(this)">Complete</button>
    </div>
    <script>
        function markAsDone(button) {
            const task = button.parentElement;
            task.style.textDecoration = 'line-through';
            button.disabled = true;
        }
    </script>
</body>
</html>
